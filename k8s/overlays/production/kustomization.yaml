apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-task-platform

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
    target:
      kind: Deployment
      name: worker
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: frontend

commonLabels:
  environment: production

images:
  - name: jinitpatel/ai-task-backend
    newTag: latest
  - name: jinitpatel/ai-task-worker
    newTag: latest
  - name: jinitpatel/ai-task-frontend
    newTag: latest
